<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <!-- Gradient for the capsule -->
    <linearGradient id="capsuleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF1B6D"></stop>
      <stop offset="50%" style="stop-color:#D946A6"></stop>
      <stop offset="100%" style="stop-color:#A855F7"></stop>
    </linearGradient>
    <!-- Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#FF1B6D" flood-opacity="0.4"></feDropShadow>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="180" fill="#000000"></circle>

  <!-- Vitamin capsule body (rotated 90 degrees) -->
  <g filter="url(#shadow)">
    <!-- Left half of capsule (hot pink) -->
    <path d="M200 140 L120 140 Q70 140 70 200 Q70 260 120 260 L200 260 Z" fill="#FF1B6D"></path>

    <!-- Right half of capsule (purple) -->
    <path d="M200 140 L280 140 Q330 140 330 200 Q330 260 280 260 L200 260 Z" fill="#A855F7"></path>

    <!-- Capsule divider line with gradient -->
    <line x1="200" y1="140" x2="200" y2="260" stroke="url(#capsuleGradient)" stroke-width="2" opacity="0.3"></line>
  </g>

  <!-- Text on the capsule -->
  <text x="200" y="210" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="bold" text-anchor="middle">
    <tspan fill="#FFFFFF">Pic</tspan><tspan fill="#FFFFFF">Tamin</tspan>
  </text>

  <!-- Optional: Glow effect -->
  <circle cx="200" cy="200" r="120" fill="none" stroke="url(#capsuleGradient)" stroke-width="1" opacity="0.2"></circle>
</svg>
